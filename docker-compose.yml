# Vikas Tool Mart - CROS - app + postgres + worker
# Usage: docker compose up --build
# PostgreSQL may instead be a managed instance - point DATABASE_URL at it and
# remove the postgres service + depends_on.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vtm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vtm_password}
      POSTGRES_DB: ${POSTGRES_DB:-vtm_cros}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-vtm} -d ${POSTGRES_DB:-vtm_cros}']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    env_file: .env
    environment:
      # Inside the compose network the DB host is the service name.
      DATABASE_URL: postgresql://${POSTGRES_USER:-vtm}:${POSTGRES_PASSWORD:-vtm_password}@postgres:5432/${POSTGRES_DB:-vtm_cros}?schema=public
      # Container always serves on 3000 regardless of any local-dev PORT in .env.
      PORT: 3000
      BETTER_AUTH_URL: ${BETTER_AUTH_URL_DOCKER:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3000:3000'
    # Run migrations + seed (idempotent), then start the server.
    command: sh -c "npx prisma migrate deploy && npx prisma db seed; node server.js"
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vtm}:${POSTGRES_PASSWORD:-vtm_password}@postgres:5432/${POSTGRES_DB:-vtm_cros}?schema=public
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
